<!DOCTYPE html>
<html lang="es">
  <head>

    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    <title><%= htmlWebpackPlugin.options.title %></title>
    <meta name="description" content="Composición, arreglos y dirección orquestal. Llevando la música del papel al podio.">

    <meta property="og:site_name" content="Eduardo Gajardo Schmidlin">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_CL">
    <meta property="og:title" content="Eduardo Gajardo Schmidlin · Maestro Sinfónico">
    <meta property="og:description" content="Composición, arreglos y dirección orquestal. Llevando la música del papel al podio.">
    <meta property="og:url" content="https://egschmaestrosinfonico.netlify.app/">
    <meta property="og:image" content="https://egschmaestrosinfonico.netlify.app/img/image_maestro.jpg">
    <meta property="og:image:secure_url" content="https://egschmaestrosinfonico.netlify.app/img/image_maestro.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1600">
    <meta property="og:image:height" content="1066">
    <meta property="og:image:alt" content="Eduardo Gajardo Schmidlin, Maestro Sinfónico y Director de Orquesta">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Eduardo Gajardo Schmidlin · Maestro Sinfónico">
    <meta name="twitter:description" content="Composición, arreglos y dirección orquestal. Llevando la música del papel al podio.">
    <meta name="twitter:image" content="https://egschmaestrosinfonico.netlify.app/img/image_maestro.jpg">
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
