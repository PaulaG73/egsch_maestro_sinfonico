<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    <title><%= htmlWebpackPlugin.options.title %></title>
    <meta name="description" content="<%= htmlWebpackPlugin.options.ogDescription %>">
    <% if (htmlWebpackPlugin.options.ogPageUrl) { %>
    <meta property="og:site_name" content="Vinóloga">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_CL">
    <meta property="og:title" content="<%= htmlWebpackPlugin.options.title %>">
    <meta property="og:description" content="<%= htmlWebpackPlugin.options.ogDescription %>">
    <meta property="og:url" content="<%= htmlWebpackPlugin.options.ogPageUrl %>">
    <meta property="og:image" content="<%= htmlWebpackPlugin.options.ogImageUrl %>">
    <meta property="og:image:secure_url" content="<%= htmlWebpackPlugin.options.ogImageUrl %>">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="<%= htmlWebpackPlugin.options.ogImageWidth %>">
    <meta property="og:image:height" content="<%= htmlWebpackPlugin.options.ogImageHeight %>">
    <meta property="og:image:alt" content="El mundo de Vinóloga — valle del Douro">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="<%= htmlWebpackPlugin.options.title %>">
    <meta name="twitter:description" content="<%= htmlWebpackPlugin.options.ogDescription %>">
    <meta name="twitter:image" content="<%= htmlWebpackPlugin.options.ogImageUrl %>">
    <% } %>
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
